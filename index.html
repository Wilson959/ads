<title>Google Drive Downloader From API</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
    background-color: #fff;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    text-align: center;
    margin-top: 50px;
  }
  input[type="text"] {
    width: 80%;
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 16px;
  }
  button {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 4px;
  }
  button:hover {
    background-color: #45a049;
  }
</style>
<script>
  var apiKey = 'AIzaSyBpGu8j3PJI_wNuohCIodyFV-T0-VBEh0U';

  // Function to extract file ID from Google Drive link or ID
  function extractFileId(urlOrId) {
    var fileId = '';
    // Check if the input is a link or ID
    if (urlOrId.includes('drive.google.com')) {
      // Extract file ID from link
      var match = /(?:\/d\/|id=)([^\/\&\?]+)/.exec(urlOrId);
      fileId = match ? match[1] : '';
    } else {
      // Assume input is the file ID
      fileId = urlOrId;
    }
    return fileId;
  }

  // Function to redirect to Google Drive download link
  function redirectToDownload() {
    var driveLinkOrId = document.getElementById('driveLinkOrId').value.trim();
    var fileId = extractFileId(driveLinkOrId);

    if (!fileId) {
      alert('Please enter a valid Google Drive link or ID.');
      return;
    }

    var url = 'https://www.googleapis.com/drive/v2/files/' + fileId + '?alt=media&key=' + apiKey + '&filename=';

    // Redirect the user to the download link
    window.location.href = url;
  }

  // Auto redirect after 3 seconds if both ID and filename are available
  function autoRedirect() {
    var driveLinkOrId = document.getElementById('driveLinkOrId').value.trim();
    var fileId = extractFileId(driveLinkOrId);

    if (!fileId || !"") {
      return;
    }

    var url = 'https://www.googleapis.com/drive/v3/files/' + fileId + '?alt=media&key=' + apiKey + '&filename=';

    setTimeout(function() {
      window.location.href = url;
    }, 3000); // Redirect after 3 seconds
  }

  // Call autoRedirect on page load
  window.onload = autoRedirect;
</script>

<body>
  <div class="container">
    <h2>Google Drive Downloader</h2>
    <input type="text" id="driveLinkOrId" placeholder="Enter Google Drive Link or ID" value="">
    <br><br>
    <button onclick="redirectToDownload()">Download File</button>
  </div>


</body>
